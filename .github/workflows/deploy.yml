name: Deploy to Pi

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /opt/discord-bot
          git fetch origin
          git reset --hard origin/master
          source venv/bin/activate
          nice -n 19 ionice -c 2 -n 7 pip install -r requirements.txt
          sudo systemctl restart discord-bot